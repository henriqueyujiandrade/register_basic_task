<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-left">
        <span class="status-dot" id="status-dot"></span>
        <div>
          <h1>Task Register</h1>
          <span class="subtitle">SelfTeam &middot; Registrar nova tarefa</span>
        </div>
      </div>
    </header>

    <main class="main main--centered">
      <div class="card form-card">
        <span class="card-label">Nova Tarefa</span>
        <form id="task-form" class="task-form">
          <div class="form-group">
            <label class="form-label" for="task-name">Nome</label>
            <input type="text" id="task-name" class="form-input" placeholder="Nome da tarefa" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="task-desc">Descrição</label>
            <textarea id="task-desc" class="form-textarea" placeholder="Descrição da tarefa" rows="4"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-submit" id="btn-submit">Registrar</button>
          </div>
          <div id="form-feedback" class="form-feedback hidden"></div>
        </form>
      </div>
    </main>

    <footer class="footer">
      Task Register &mdash; SelfTeam
    </footer>

  </div>
  <script src="script.js"></script>
</body>
</html>
